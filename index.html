<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electronics Toolkit Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>⚡ Electronics Toolkit Pro</h1>

<h2>Resistor Color Code Calculator</h2>

<select id="band1">
<option value="0">Black</option>
<option value="1">Brown</option>
<option value="2">Red</option>
<option value="3">Orange</option>
<option value="4">Yellow</option>
<option value="5">Green</option>
<option value="6">Blue</option>
<option value="7">Violet</option>
<option value="8">Grey</option>
<option value="9">White</option>
</select>

<select id="band2">
<option value="0">Black</option>
<option value="1">Brown</option>
<option value="2">Red</option>
<option value="3">Orange</option>
<option value="4">Yellow</option>
<option value="5">Green</option>
<option value="6">Blue</option>
<option value="7">Violet</option>
<option value="8">Grey</option>
<option value="9">White</option>
</select>

<select id="multiplier">
<option value="1">Black ×1</option>
<option value="10">Brown ×10</option>
<option value="100">Red ×100</option>
<option value="1000">Orange ×1K</option>
<option value="10000">Yellow ×10K</option>
<option value="100000">Green ×100K</option>
<option value="1000000">Blue ×1M</option>
</select>

<select id="tolerance">
<option value="gold">Gold ±5%</option>
<option value="silver">Silver ±10%</option>
<option value="brown">Brown ±1%</option>
<option value="red">Red ±2%</option>
</select>

<!-- Resistor Visualization -->

<div class="resistor-container">

<div class="wire"></div>

<div class="resistor-body">

<div id="band1Color" class="band"></div>

<div id="band2Color" class="band"></div>

<div id="multiplierColor" class="band"></div>

<div id="toleranceColor" class="band gold"></div>

</div>

<div class="wire"></div>

</div>
<button onclick="calculateResistor()">
Calculate Resistance
</button>

<h2 id="result">
Resistance: -
</h2>

<h3 id="range">
Tolerance Range: -
</h3>

</div>

<script src="script.js"></script>

</body>
</html>
